use_default_settings: true

general:
  instance_name: "Nautilus local search"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "nautilus-local-only-change-if-exposed"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
